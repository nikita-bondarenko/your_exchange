name: Sync Directory Excluding Specific Files and Run Docker Compose

on:
  push:
    branches:
      - main # Меняйте на вашу рабочую ветку
  workflow_dispatch: # Возможность ручного запуска

jobs:
  sync_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Extract and show repository name
        id: extract_repo_name
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          echo "::set-output name=repo_name::$REPO_NAME"

      - name: Use the extracted repository name
        run: |
          echo "The repository name is: ${{ steps.extract_repo_name.outputs.repo_name }}/"

      # Копируем директорию на сервер через rsync, исключая .env и app/data/token.txt
      - name: Rsync directory excluding specific files
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }}
          source: "." # Директория для копирования
          target: "/home/apps/${{ steps.extract_repo_name.outputs.repo_name }}" # Удалённая директория на сервере
          exclude: ".env,app/data/token.txt" # Исключаемые файлы

      # Выполняем Docker Compose на сервере
      - name: Start Docker Compose on Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }}
          port: 22
          script: |
            cd /home/apps/${{ steps.extract_repo_name.outputs.repo_name }}" && \
             docker compose down && \
             docker system prune -a -f && \
             docker-compose up -d 