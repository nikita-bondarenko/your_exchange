services:
  # Main service for Traefik (nginx load balancer)
  test-change:
    image: nginx:alpine
    container_name: test-change
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - coex-tma
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/nginx-health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.testChange.rule=Host(`test-change-front-2025.partners-bot.ru`)"
      - "traefik.http.routers.testChange.entrypoints=websecure"
      - "traefik.http.routers.testChange.tls.certresolver=myresolver"
      - "traefik.http.routers.testChange.service=testChange"

      - "traefik.http.services.testChange.loadbalancer.server.port=80"

      # Rate Limit — РАБОТАЕТ!
      - "traefik.http.middlewares.testChange-limit.inflightreq.amount=30"

      # Security Headers
      - "traefik.http.middlewares.testChange-sec.headers.sslRedirect=true"
      - "traefik.http.middlewares.testChange-sec.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.testChange-sec.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.testChange-sec.headers.stsPreload=true"
      - "traefik.http.middlewares.testChange-sec.headers.frameDeny=true"
      - "traefik.http.middlewares.testChange-sec.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.testChange-sec.headers.browserXssFilter=true"

      # Применяем
      - "traefik.http.routers.testChange.middlewares=testChange-limit,testChange-sec" 

  # Blue instance for zero-downtime deployment
  test-change-blue:
    build:
      context: ./app
      dockerfile: Dockerfile
      args:
      - NEXT_PUBLIC_PROJECT_NAME=${NEXT_PUBLIC_PROJECT_NAME}
    container_name: test-change-blue
    user: "1000:1000"
    environment:
      - NEXT_PUBLIC_PROJECT_NAME=${NEXT_PUBLIC_PROJECT_NAME}
      - NODE_ENV=production
      - PORT=3000
      - INSTANCE_COLOR=blue
    volumes:
      - test-change_logs:/app/logs
      - ./app/data:/usr/src/app/data  # Только для token.txt и логов
    networks:
      - coex-tma
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    profiles:
      - blue-green

  # Green instance for zero-downtime deployment
  test-change-green:
    build:
      context: ./app
      dockerfile: Dockerfile
      args:
      - NEXT_PUBLIC_PROJECT_NAME=${NEXT_PUBLIC_PROJECT_NAME}
    container_name: test-change-green
    user: "1000:1000"
    environment:
      - NEXT_PUBLIC_PROJECT_NAME=${NEXT_PUBLIC_PROJECT_NAME}
      - NODE_ENV=production
      - PORT=3000
      - INSTANCE_COLOR=green
    volumes:
      - test-change_logs:/app/logs
      - ./app/data:/usr/src/app/data  # Только для token.txt и логов
    networks:
      - coex-tma
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    profiles:
      - blue-green

volumes:
  test-change_logs:
    driver: local
  test-change_data:  # Для data
    driver: local

networks:
  coex-tma:
    external: true